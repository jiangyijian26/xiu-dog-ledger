services:
  - type: web
    name: xiu-dog-ledger-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_SSL
        value: "true"
